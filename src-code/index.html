<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
<body>
    <script src="https://unpkg.com/konva@9/konva.min.js"></script>
    <script src="main.js" type="module"></script>
    <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/6Xu24Sz4zowjnRslYJUyF3?utm_source=generator" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    <button id="next-turn-button">Next Turn</button>
    <div id="container"></div>
    <div id="add-character">
        <p>Width:</p>
        <input id="input-w" type="">
        <p>Height:</p>
        <input id="input-h" type="">
        <p>NAME:</p>
        <input id="input-name" type="">
        <p>STR:</p>
        <input id="input-str" type="">
        <p>DEX:</p>
        <input id="input-dex" type="">
        <p>CON:</p>
        <input id="input-con" type="">
        <p>INT:</p>
        <input id="input-int" type="">
        <p>WIS:</p>
        <input id="input-wis" type="">
        <p>CHA:</p>
        <input id="input-cha" type="">
        <p>Class:</p>
        <select id="input-class" type="">
            <option value="">Select Class</option>
            <option value="rogue">Rogue</option>
            <option value="sniper">Sniper</option>
            <option value="wizard">Wizard</option>
            <option value="demon">Demon</option>
        </select>
        <button id="create-button">Create</button>
    </div>



</body>
</html>
