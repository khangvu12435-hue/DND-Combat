<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DND Combat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <img src="assets/backgrounds/grass.jpg" id="grass-bg">
    <img src="assets/sprites/default-player.png" id="default-character">
    <img src="assets/backgrounds/stone.jpg" id="stone-bg">
    <img src="assets/backgrounds/dark.png" id="dark-ovly">
    <img src="assets/sprites/evilWizard.png" id="evilWizard-character">

    <div id="div-music-player">

    <div id="div-players">
        <p>players</p>
    </div>
        
    <div id="div-monsters">
        <p>monsters</p>
    </div>
        
    <div id="div-map-editor">
        <canvas id="map"></canvas>
        <script type="module" src="main.js"></script>
    </div>

    <div id="div-log"></div>
        <p>log</p>
